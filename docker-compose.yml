version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: arogya_db
    environment:
      POSTGRES_USER: arogya
      POSTGRES_PASSWORD: arogya123
      POSTGRES_DB: arogyamitra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arogya"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: arogya_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://arogya:arogya123@postgres:5432/arogyamitra
      SYNC_DATABASE_URL: postgresql://arogya:arogya123@postgres:5432/arogyamitra
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: arogya_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    restart: unless-stopped

volumes:
  postgres_data:
